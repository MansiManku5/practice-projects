<html>
<body>

<div class="header">
    <div class="logo">facebook</div>
    <div class="login">
        <input type="text" placeholder="Email or Phone">
        <input type="password" placeholder="Password">
        <button>Log In</button>
    </div>
</div>


<div class="main">


    <div class="left">
        <h2>Connect with friends and the world around you on Facebook.</h2>

        <p>📷 See photos and updates from friends in News Feed.</p>
        <p>⭐ Share what's new in your life on your Timeline.</p>
        <p>🔍 Find more of what you're looking for with Facebook Search.</p>
    </div>

 
    <div class="right">
        <h1>Sign Up</h1>
        <p>It's free and always will be.</p>

        <input type="text" placeholder="First name">
        <input type="text" placeholder="Last name">
        <input type="text" placeholder="Mobile number or email">
        <input type="password" placeholder="New password">

        <label>Birthday</label>
        <div class="birthday">
            <select><option>Jan</option></select>
            <select><option>9</option></select>
            <select><option>1993</option></select>
        </div>


        

        <div class="gender">
            <label><input type="radio"> Female</label>
            <label><input type="radio"> Male</label>
        </div>

        <button class="signup-btn">Create Account</button>
    </div>

</div>

</body>
<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f0f2f5;
}


.header {
    background: #3b5998;
    color: white;
    display: flex;
    justify-content: space-between;
    padding: 15px 50px;
    align-items: center;
}

.logo {
    font-size: 30px;
    font-weight: bold;
}

.login input {
    padding: 5px;
    margin-right: 10px;
}

.login button {
    background: #4267B2;
    color: white;
    border: none;
    padding: 6px 10px;
    cursor: pointer;
}


.main {
    display: flex;
    justify-content: space-around;
    padding: 50px;
}


.left {
    width: 40%;
}

.left h2 {
    font-size: 22px;
}

.left p {
    margin: 15px 0;
}


.right {
    width: 35%;
    background: #f0f2f5;
    padding: 20px;
    border-radius: 5px;
}

.right h1 {
    margin-bottom: 5px;
}

.right input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ddd;
    border-radius: 4px;
}


.birthday select {
    padding: 8px;
    margin-right: 5px;
}


.gender {
    margin: 10px 0;
}


.signup-btn {
    background: #42b72a;
    color: white;
    padding: 10px;
    border: none;
    width: 100%;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
}
</style>

</html>
